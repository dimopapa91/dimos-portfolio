<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Dimos Papageorgiou</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23060100'/%3E%3Cpath d='M0 54 L13 30 L22 42 L34 18 L47 40 L56 32 L64 44 L64 64 L0 64 Z' fill='%23d05c18'/%3E%3Cpath d='M0 64 L0 58 L18 46 L30 52 L46 44 L64 52 L64 64 Z' fill='%23ff8c38' opacity='0.55'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,900&family=Barlow:wght@300&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #060100; color: #fff; overflow: hidden; }
        #terrain { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        #terrain svg { width: 100%; height: 100%; animation: breathe 10s ease-in-out infinite alternate; }
        @keyframes breathe { 0% { opacity: 0.9; transform: translateY(0); } 100% { opacity: 1; transform: translateY(-6px); } }
        .wrap {
            position: relative; z-index: 2;
            height: 100%; display: flex; flex-direction: column;
            align-items: flex-start; justify-content: center;
            padding: 0 38px; max-width: 900px;
        }
        .eyebrow {
            font-family: 'Barlow', sans-serif;
            font-size: 9px; font-weight: 300;
            letter-spacing: 0.25em; text-transform: uppercase;
            opacity: 0.45; margin-bottom: 18px;
        }
        h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-style: italic; font-weight: 900;
            font-size: clamp(90px, 18vw, 220px);
            line-height: 0.85; text-transform: uppercase;
            color: #ff8c38;
        }
        .sub {
            font-family: 'Barlow Condensed', sans-serif;
            font-style: italic; font-weight: 900;
            font-size: clamp(28px, 5vw, 54px);
            line-height: 0.95; text-transform: uppercase;
            margin: 10px 0 34px;
        }
        a.home {
            font-family: 'Barlow', sans-serif;
            font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
            color: #fff; text-decoration: none;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 12px 28px;
            transition: background 0.2s, color 0.2s;
        }
        a.home:hover { background: #fff; color: #000; }
    </style>
</head>
<body>
<div id="terrain" aria-hidden="true">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
    <defs>
      <linearGradient id="tg-back" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#7a2808"/><stop offset="100%" stop-color="#0a0100"/>
      </linearGradient>
      <linearGradient id="tg-front" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#d86020"/><stop offset="28%" stop-color="#c04010"/>
        <stop offset="62%" stop-color="#7a2000"/><stop offset="100%" stop-color="#060100"/>
      </linearGradient>
    </defs>
    <path d="M0,100 L0,78 C8,74 16,78 24,70 C32,62 40,67 48,60 C56,53 64,58 72,62 C80,66 88,62 96,68 L100,70 L100,100 Z" fill="url(#tg-back)"/>
    <path d="M0,100 L0,68 C4,63 7,66 10,56 C14,46 18,52 22,40 C26,28 30,36 34,24 C38,12 42,20 46,12 C50,4 54,10 58,14 C62,18 66,10 70,18 C74,26 78,32 82,40 C86,48 90,54 94,60 C97,64 99,67 100,68 L100,100 Z" fill="url(#tg-front)"/>
  </svg>
</div>
<div class="wrap">
    <div class="eyebrow">Error 404</div>
    <h1>404</h1>
    <div class="sub">Lost in the terrain</div>
    <a class="home" href="/">← Back to base camp</a>
</div>
</body>
</html>
